<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>GClaw</title></head>
<body style="margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#1a1a2e;color:#888;font-family:system-ui">
<div>
  <svg width="32" height="32" viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" stroke="#555" stroke-width="3" fill="none" stroke-dasharray="50 20"/></svg>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</div>
</body>
</html>
